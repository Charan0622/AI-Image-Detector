<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spectra — AI image forensics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,400&family=JetBrains+Mono:wght@400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:    #0b0b0b;
            --ink:   #ededed;
            --mute:  #7a7a7a;
            --dim:   #4a4a4a;
            --line:  rgba(255,255,255,0.08);
            --accent: #e6e6e6;        /* neutral white-ish; shifts with verdict */
            --real:   #9ec27e;
            --fake:   #d88280;
        }
        * { box-sizing: border-box; }
        html, body {
            background: var(--bg);
            color: var(--ink);
            font-family: 'Inter', ui-sans-serif, -apple-system, BlinkMacSystemFont, sans-serif;
            font-weight: 400;
            letter-spacing: -0.01em;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
        }
        .serif { font-family: 'Fraunces', 'Iowan Old Style', Georgia, serif; letter-spacing: -0.02em; }
        .mono  { font-family: 'JetBrains Mono', 'SF Mono', monospace; font-feature-settings: "zero"; }
        .tabular { font-variant-numeric: tabular-nums; }
        .smallcaps { text-transform: uppercase; letter-spacing: 0.16em; font-size: 0.7rem; color: var(--mute); font-weight: 500; }
        .hairline { border: 1px solid var(--line); }
        .rule { height: 1px; background: var(--line); width: 100%; }

        /* restrained transitions only */
        .fade { animation: fade 420ms cubic-bezier(.2,.7,.2,1) both; }
        @keyframes fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

        .drag-active { border-color: var(--ink) !important; }

        /* sweep for heatmap reveal — the only piece of drama we keep */
        @keyframes sweep { from { clip-path: inset(0 100% 0 0); } to { clip-path: inset(0 0 0 0); } }

        /* selection */
        ::selection { background: rgba(255,255,255,0.2); color: #fff; }

        /* scrollbar — quiet */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 4px; }

        input, textarea { color-scheme: dark; }
        button { font-family: inherit; cursor: pointer; }
        button:disabled { cursor: not-allowed; }

        /* the ONE accent — a single thin line that shifts with verdict */
        .accent-line {
            height: 1px;
            background: var(--accent);
            transition: background 900ms cubic-bezier(.2,.7,.2,1);
        }
    </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useRef, useEffect, useMemo } = React;
const API_URL = window.location.origin;

// ------------------------------------------------------------------
// Single piece of colour logic: verdict → CSS accent
// ------------------------------------------------------------------
// Colour by *band* (real / uncertain / fake), not raw probability — the
// backend has the threshold logic and OOD detector, we just respect it.
function colorForBand(band) {
    if (band === "real")         return "#9ec27e";
    if (band === "likely_real")  return "#bcd9a3";  // softer than full real
    if (band === "fake")         return "#d88280";
    if (band === "uncertain")    return "#d9c97a";
    return "#e6e6e6";
}
function setAccentFromResult(result) {
    const c = result?.band ? colorForBand(result.band) : "#e6e6e6";
    document.documentElement.style.setProperty("--accent", c);
}

// ------------------------------------------------------------------
// DCT spectrum loader — the piece we're keeping
// ------------------------------------------------------------------
function DCTLoader({ label = "Analysing spectrum" }) {
    const canvasRef = useRef(null);
    useEffect(() => {
        const canvas = canvasRef.current; if (!canvas) return;
        const ctx = canvas.getContext("2d");
        let frame = 0; let raf;
        const N = 28;
        const draw = () => {
            frame++;
            const W = canvas.width, H = canvas.height;
            ctx.clearRect(0,0,W,H);
            const cell = W / N;
            for (let y = 0; y < N; y++) {
                for (let x = 0; x < N; x++) {
                    const d = Math.sqrt((x - N/2)**2 + (y - N/2)**2);
                    const wave = Math.sin(frame * 0.06 - d * 0.55) * 0.5 + 0.5;
                    const fade = Math.max(0, 1 - d / (N * 0.7));
                    const alpha = wave * fade * 0.85;
                    ctx.fillStyle = `rgba(255,255,255,${alpha.toFixed(3)})`;
                    ctx.fillRect(x * cell + 1, y * cell + 1, cell - 2, cell - 2);
                }
            }
            raf = requestAnimationFrame(draw);
        };
        draw();
        return () => cancelAnimationFrame(raf);
    }, []);
    return (
        <div className="fade flex items-center gap-5">
            <canvas ref={canvasRef} width="140" height="140" className="hairline rounded" />
            <div>
                <div className="smallcaps">{label}</div>
                <div className="serif italic text-xl mt-1">computing DCT + CLIP features…</div>
            </div>
        </div>
    );
}

// ------------------------------------------------------------------
// Seismograph — breathing wave that settles to a value
// ------------------------------------------------------------------
function Seismograph({ value, color }) {
    const ref = useRef(null);
    useEffect(() => {
        const canvas = ref.current; if (!canvas) return;
        const ctx = canvas.getContext("2d");
        const W = canvas.width, H = canvas.height;
        let frame = 0; let raf;
        const start = performance.now();
        const settleMs = 1400;
        const draw = () => {
            const t = Math.min(1, (performance.now() - start) / settleMs);
            const amp = 1 - Math.pow(1 - t, 3);
            frame++;
            ctx.clearRect(0, 0, W, H);
            // baseline
            ctx.strokeStyle = "rgba(255,255,255,0.06)";
            ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(0, H / 2); ctx.lineTo(W, H / 2); ctx.stroke();
            // wave
            ctx.strokeStyle = color;
            ctx.lineWidth = 1.4;
            ctx.beginPath();
            const targetY = H - value * H;
            for (let x = 0; x < W; x++) {
                const u = x / W;
                const phase = frame * 0.1 - u * 10;
                const noise = (Math.sin(phase) + 0.6 * Math.sin(phase * 1.9)) * 5;
                const baseY = H / 2 + (1 - amp) * noise;
                const y = baseY * (1 - amp) + targetY * amp;
                if (x === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            }
            ctx.stroke();
            if (t < 1) raf = requestAnimationFrame(draw);
        };
        draw();
        return () => cancelAnimationFrame(raf);
    }, [value, color]);
    return <canvas ref={ref} width="480" height="48" className="w-full h-[48px]" />;
}

// ------------------------------------------------------------------
// Temperature chip — quiet signal of rigor
// ------------------------------------------------------------------
const CAL = { data: null };
function useCal() {
    const [c, setC] = useState(CAL.data);
    useEffect(() => {
        if (CAL.data) return;
        fetch(`${API_URL}/dashboard/data`).then(r => r.json()).then(d => {
            CAL.data = d?.calibration || {}; setC(CAL.data);
        }).catch(() => {});
    }, []);
    return c || {};
}
function TempChip({ model }) {
    const cal = useCal();
    const T = cal[model]?.temperature;
    const [show, setShow] = useState(false);
    if (T == null) return null;
    return (
        <span className="relative mono text-[11px] text-[color:var(--mute)] hover:text-[color:var(--ink)] transition-colors cursor-help"
            onMouseEnter={() => setShow(true)} onMouseLeave={() => setShow(false)}>
            τ = {T.toFixed(2)}
            {show && (
                <span className="absolute top-full right-0 mt-2 w-60 p-3 rounded hairline text-[11px] leading-snug text-[color:var(--ink)] z-10 text-left"
                    style={{ background: "#0f0f0f" }}>
                    Temperature scaling. Softmax(logits / τ) gives calibrated confidences — a reported 90% means 90% empirically right on the val set.
                </span>
            )}
        </span>
    );
}

// ------------------------------------------------------------------
// Upload zone — plainest possible
// ------------------------------------------------------------------
function UploadZone({ onImageSelect }) {
    const [drag, setDrag] = useState(false);
    const ref = useRef(null);
    return (
        <div
            className={`hairline rounded p-14 text-center cursor-pointer transition-colors ${drag ? 'drag-active' : 'hover:border-[color:var(--mute)]'}`}
            onDragOver={(e) => { e.preventDefault(); setDrag(true); }}
            onDragLeave={() => setDrag(false)}
            onDrop={(e) => { e.preventDefault(); setDrag(false); if (e.dataTransfer.files?.[0]) onImageSelect(e.dataTransfer.files[0]); }}
            onClick={() => ref.current?.click()}
        >
            <div className="smallcaps mb-3">Specimen</div>
            <div className="serif text-2xl">Drop an image to begin</div>
            <div className="text-sm text-[color:var(--mute)] mt-2">or click to browse · JPEG, PNG · ≤10 MB</div>
            <input ref={ref} type="file" accept="image/*" className="hidden"
                onChange={(e) => e.target.files?.[0] && onImageSelect(e.target.files[0])} />
        </div>
    );
}

// ------------------------------------------------------------------
// Image viewer with before/after divider — the one genuinely forensic piece
// ------------------------------------------------------------------
function ImageViewer({ result, previewUrl }) {
    const [pos, setPos] = useState(50);
    const [mode, setMode] = useState("divider"); // divider | heatmap | original
    const [swept, setSwept] = useState(false);
    const ref = useRef(null);
    const drag = useRef(false);

    useEffect(() => {
        setSwept(false);
        const t = setTimeout(() => setSwept(true), 60);
        return () => clearTimeout(t);
    }, [result?.heatmap_base64]);

    const onMove = (e) => {
        if (!drag.current || !ref.current) return;
        const rect = ref.current.getBoundingClientRect();
        const touch = e.touches?.[0] || e;
        const x = touch.clientX - rect.left;
        setPos(Math.max(0, Math.min(100, (x / rect.width) * 100)));
    };

    if (!result?.heatmap_base64) {
        return previewUrl ? (
            <div className="rounded overflow-hidden hairline">
                <img src={previewUrl} className="block w-full" />
            </div>
        ) : null;
    }

    return (
        <div className="fade">
            <div className="flex items-center justify-between mb-3 text-xs">
                <span className="smallcaps">Spatial evidence</span>
                <div className="flex gap-3">
                    {["divider", "heatmap", "original"].map(m => (
                        <button key={m}
                            onClick={() => setMode(m)}
                            className={`smallcaps transition-colors ${mode === m ? 'text-[color:var(--ink)]' : 'text-[color:var(--mute)] hover:text-[color:var(--ink)]'}`}>
                            {m === "divider" ? "Compare" : m === "heatmap" ? "Heatmap" : "Original"}
                        </button>
                    ))}
                </div>
            </div>

            <div
                ref={ref}
                className="relative rounded overflow-hidden hairline select-none"
                style={{ aspectRatio: "1 / 1", touchAction: "none", cursor: mode === "divider" ? "ew-resize" : "default" }}
                onMouseDown={() => { if (mode === "divider") drag.current = true; }}
                onMouseMove={onMove}
                onMouseUp={() => { drag.current = false; }}
                onMouseLeave={() => { drag.current = false; }}
                onTouchStart={() => { if (mode === "divider") drag.current = true; }}
                onTouchMove={onMove}
                onTouchEnd={() => { drag.current = false; }}
            >
                <img src={previewUrl} className="absolute inset-0 w-full h-full object-cover" draggable="false" />
                {mode !== "original" && (
                    <img
                        src={result.heatmap_base64}
                        className="absolute inset-0 w-full h-full object-cover"
                        draggable="false"
                        style={
                            mode === "divider"
                                ? { clipPath: `inset(0 ${100 - pos}% 0 0)` }
                                : { animation: swept ? "none" : "sweep 500ms cubic-bezier(.2,.7,.2,1) both" }
                        }
                    />
                )}
                {mode === "divider" && (
                    <>
                        <div className="absolute top-0 bottom-0 pointer-events-none"
                            style={{ left: `${pos}%`, width: "1px", background: "#fff" }} />
                        <div className="absolute top-2 left-2 smallcaps text-[10px] px-1.5 py-0.5 rounded" style={{ background: "rgba(0,0,0,0.55)" }}>Original</div>
                        <div className="absolute top-2 right-2 smallcaps text-[10px] px-1.5 py-0.5 rounded" style={{ background: "rgba(0,0,0,0.55)" }}>Heatmap</div>
                    </>
                )}
            </div>
        </div>
    );
}

// ------------------------------------------------------------------
// Verdict block — pure typography, no card, no border, no flourish.
// ------------------------------------------------------------------
function Verdict({ result }) {
    if (!result) return null;
    const band = result.band || (result.verdict === "AI-Generated" ? "fake" : "real");
    const fakeProb = result.fake_probability ?? 0;
    const pct = Math.round(result.confidence * 100);
    const color = colorForBand(band);
    const word = band === "fake"        ? "Synthesised"
              : band === "real"          ? "Authentic"
              : band === "likely_real"   ? "Likely Real"
              :                            "Inconclusive";
    const subtitle = band === "fake"        ? "AI-generated."
                  : band === "real"          ? "A captured photograph."
                  : band === "likely_real"   ? "A real photograph — possibly lightly edited or filtered."
                  :                            "The model isn't confident about this image.";

    const oodPct = Math.round((result.ood_score ?? 0) * 100);

    return (
        <div className="fade">
            <div className="smallcaps">Determination</div>
            <div className="serif italic text-6xl md:text-7xl leading-none mt-3 tracking-tight"
                style={{ color, fontWeight: 400 }}>
                {word}.
            </div>
            <div className="serif italic text-lg text-[color:var(--mute)] mt-4">
                {subtitle}
            </div>

            {/* explicit reason when uncertain */}
            {band === "uncertain" && result.ood_reason && (
                <div className="mt-4 p-3 rounded hairline text-sm leading-relaxed text-[color:var(--mute)]">
                    <span className="smallcaps mr-2" style={{ color }}>Why uncertain</span>
                    {result.ood_reason === "outside training distribution"
                        ? "This image's CLIP features are far from anything the model saw during training (smartphone photo, modern AI generator, or unusual content). The reported probability shouldn't be trusted as a binary call."
                        : "The model's calibrated probability sits between 30% and 85% — too close to the decision boundary to call confidently."}
                </div>
            )}

            {/* seismograph confidence */}
            <div className="mt-8">
                <Seismograph value={pct / 100} color={color} />
                <div className="flex justify-between mt-2 text-xs">
                    <span className="smallcaps">{band === "uncertain" ? "Margin" : "Confidence"}</span>
                    <span className="mono tabular" style={{ color }}>{pct.toFixed(0)}%</span>
                </div>
            </div>

            {/* measurements */}
            <dl className="mt-10 space-y-2.5 text-sm">
                <Row k="Verdict"      v={<span style={{color}} className="serif italic">{word}</span>} />
                <Row k="P(AI)"        v={<span className="mono tabular">{fakeProb.toFixed(4)}</span>} />
                <Row k="OOD score"    v={<OODBadge score={result.ood_score ?? 0} />} />
                <Row k="Model"        v={<span className="mono">{result.model_name}</span>} />
                <Row k="Temperature"  v={<TempChip model={result.model_name} />} />
                <Row k="Inference"    v={<span className="mono tabular">{result.inference_time_ms?.toFixed(0) || 0} ms</span>} />
            </dl>
        </div>
    );
}

function OODBadge({ score }) {
    const pct = Math.round(score * 100);
    const tone = score < 0.3 ? "in-dist" : score < 0.7 ? "edge" : "out-of-dist";
    const color = score < 0.3 ? "#9ec27e" : score < 0.7 ? "#d9c97a" : "#d88280";
    return (
        <span className="mono tabular text-xs" style={{ color }}>
            {pct}% <span className="text-[color:var(--mute)] ml-1">{tone}</span>
        </span>
    );
}
function Row({ k, v }) {
    return (
        <div className="flex items-center justify-between border-b hairline pb-2" style={{ borderColor: "var(--line)" }}>
            <span className="smallcaps text-[10px]">{k}</span>
            <span>{v}</span>
        </div>
    );
}

// ------------------------------------------------------------------
// Evidence — plain typography, no cards, no bars.
// ------------------------------------------------------------------
function Evidence({ result }) {
    const items = result?.explanations;
    if (!items?.length) return null;
    return (
        <div className="fade mt-10">
            <div className="smallcaps mb-4">Spectral evidence</div>
            <ol className="space-y-4 text-sm leading-relaxed">
                {items.slice(0, 5).map((e, i) => (
                    <li key={i} className="flex gap-4">
                        <span className="mono text-[color:var(--dim)] tabular text-xs w-6 shrink-0 pt-0.5">{String(i+1).padStart(2, '0')}</span>
                        <div>
                            <div className="serif italic text-[color:var(--ink)]">{e.region}</div>
                            <div className="text-[color:var(--mute)] mt-0.5">{e.reason}</div>
                        </div>
                    </li>
                ))}
            </ol>
        </div>
    );
}

// ------------------------------------------------------------------
// Compare — a simple horizontal rule of 4 model verdicts
// ------------------------------------------------------------------
function Compare({ results }) {
    if (!results?.models) return null;
    const models = results.models;
    const names = {
        clip_probe:    "CLIP probe",
        hybrid:        "Hybrid",
        hybrid_robust: "Hybrid + robust",
        freq_guided:   "Freq-guided",
        freq_guided_no_robust: "Freq-guided (no aug)",
    };
    return (
        <div className="fade mt-12">
            <div className="smallcaps mb-5">Second opinions</div>
            <div className="space-y-4">
                {models.map((r, i) => {
                    const band = r.band || (r.verdict === "AI-Generated" ? "fake" : "real");
                    const color = colorForBand(band);
                    const pct = Math.round(r.confidence * 100);
                    const isDefault = r.model_name === "hybrid_robust";
                    const word = band === "fake"      ? "Synthesised"
                               : band === "real"        ? "Authentic"
                               : band === "likely_real" ? "Likely Real"
                               :                          "Inconclusive";
                    return (
                        <div key={i} className="flex items-center gap-4 text-sm">
                            <span className="w-40 text-[color:var(--mute)] shrink-0 flex items-center gap-2">
                                {names[r.model_name] || r.model_name}
                                {isDefault && <span className="mono text-[9px] smallcaps">default</span>}
                            </span>
                            <div className="flex-1 relative h-[2px]" style={{ background: "rgba(255,255,255,0.05)" }}>
                                <div className="absolute left-0 top-0 bottom-0 transition-all"
                                    style={{ width: `${pct}%`, background: color }} />
                            </div>
                            <span className="mono tabular text-xs w-14 text-right" style={{ color }}>{pct}%</span>
                            <span className="serif italic text-xs w-28 text-right" style={{ color }}>
                                {word}
                            </span>
                        </div>
                    );
                })}
            </div>
        </div>
    );
}

// ------------------------------------------------------------------
// Dashboard — one dense editorial page. No tabs, no cards, no charts
// except one carefully-chosen comparison bar.
// ------------------------------------------------------------------
function Dashboard({ data }) {
    if (!data) {
        return <div className="text-[color:var(--mute)] text-sm fade">Loading data…</div>;
    }
    const cg = data.cross_generator || {};
    const cal = data.calibration || {};
    const modelOrder = ["clip_probe", "hybrid", "hybrid_robust", "freq_guided_no_robust", "freq_guided"];
    const nameMap = {
        clip_probe:             "CLIP Linear Probe",
        hybrid:                 "AIDE Hybrid",
        hybrid_robust:          "Hybrid + Robust Aug",
        freq_guided_no_robust:  "Freq-Guided (no robust)",
        freq_guided:            "Freq-Guided (full)",
    };
    const models = modelOrder.filter(m => cg[m]);
    const gens = models[0] ? Object.keys(cg[models[0]]) : [];

    // Robust AUC table — hard-coded from our ablation_table.md so dashboard
    // is tolerant of missing robustness JSON endpoints. These are the real
    // numbers from results/tables/ablation_table.md.
    const robust = {
        clip_probe: 0.8360, hybrid: 0.8491, hybrid_robust: 0.8835,
        freq_guided_no_robust: 0.8520, freq_guided: 0.8298,
    };
    const cleanAuc = (m) => {
        const vs = Object.values(cg[m] || {}).map(v => v.auc).filter(Boolean);
        return vs.length ? vs.reduce((a, b) => a + b) / vs.length : 0;
    };

    return (
        <article className="fade max-w-4xl mx-auto">
            {/* Lead — framed as a lab report */}
            <header className="mb-12">
                <div className="smallcaps mb-3">Evaluation · §1</div>
                <h2 className="serif text-4xl md:text-5xl leading-tight tracking-tight">
                    Five models, six generators, eight degradations.
                </h2>
                <p className="text-[color:var(--mute)] mt-4 max-w-2xl leading-relaxed">
                    All detectors are evaluated on generators they never saw during training (ADM, GLIDE, Midjourney, SD v1.5, VQDM, Wukong) and on seven real-world image degradations. The surprising result is architectural: the simpler Hybrid with robustness-aware training outperforms the fancier attention-based "Freq-Guided" model under every real-world condition.
                </p>
            </header>

            {/* Main table — dense, monospaced, no row backgrounds. */}
            <section className="mb-14">
                <div className="flex items-baseline justify-between mb-4">
                    <div>
                        <div className="smallcaps">Cross-generator · AUC</div>
                        <div className="serif text-xl mt-1">Per-model, per-generator</div>
                    </div>
                    <span className="mono text-xs text-[color:var(--mute)]">clean test set · 2000 samples/gen</span>
                </div>
                <div className="rule mb-3" />
                <div className="overflow-x-auto">
                    <table className="w-full text-sm tabular">
                        <thead>
                            <tr className="text-[color:var(--mute)]">
                                <th className="text-left py-2 pr-4 smallcaps text-[10px]">Model</th>
                                {gens.map(g => <th key={g} className="py-2 px-2 text-right smallcaps text-[10px]">{g}</th>)}
                                <th className="py-2 pl-4 text-right smallcaps text-[10px]">Avg</th>
                            </tr>
                        </thead>
                        <tbody>
                            {models.map((m, i) => {
                                const avg = cleanAuc(m);
                                const isBest = m === "hybrid";
                                return (
                                    <tr key={m} className="border-t" style={{ borderColor: "var(--line)" }}>
                                        <td className="py-2.5 pr-4">
                                            {nameMap[m]} {m === "hybrid_robust" && <span className="mono text-[10px] smallcaps ml-2">deployed</span>}
                                        </td>
                                        {gens.map(g => {
                                            const v = cg[m][g]?.auc;
                                            return (
                                                <td key={g} className="py-2.5 px-2 text-right mono text-xs">
                                                    {v ? v.toFixed(3) : "—"}
                                                </td>
                                            );
                                        })}
                                        <td className="py-2.5 pl-4 text-right mono text-xs" style={{ color: isBest ? "#fff" : "inherit" }}>
                                            {avg.toFixed(3)}
                                        </td>
                                    </tr>
                                );
                            })}
                        </tbody>
                    </table>
                </div>
            </section>

            {/* Clean vs Robust — the paper's real finding */}
            <section className="mb-14">
                <div className="flex items-baseline justify-between mb-4">
                    <div>
                        <div className="smallcaps">Robustness · §2</div>
                        <div className="serif text-xl mt-1">What survives JPEG, blur, resize</div>
                    </div>
                    <span className="mono text-xs text-[color:var(--mute)]">clean vs avg of 7 degradations</span>
                </div>
                <div className="rule mb-5" />

                <div className="space-y-5">
                    {models.map(m => {
                        const clean = cleanAuc(m);
                        const rob   = robust[m] ?? 0;
                        const isBest = m === "hybrid_robust";
                        return (
                            <div key={m} className="grid grid-cols-[220px_1fr_1fr_64px] gap-5 items-center text-sm">
                                <span className="truncate">
                                    {nameMap[m]}
                                    {isBest && <span className="mono text-[9px] smallcaps ml-2">best robust</span>}
                                </span>
                                {/* clean bar */}
                                <Bar value={clean} label="clean" color="#ededed" maxLabel="1.0" />
                                {/* robust bar */}
                                <Bar value={rob} label="robust" color={isBest ? "#e6d488" : "#7a7a7a"} maxLabel="1.0" />
                                <span className="mono tabular text-xs text-right" style={{ color: isBest ? "#e6d488" : "inherit" }}>
                                    Δ {(clean - rob).toFixed(3)}
                                </span>
                            </div>
                        );
                    })}
                </div>
                <p className="text-xs text-[color:var(--mute)] mt-6 max-w-2xl leading-relaxed">
                    The spread between <span className="mono">clean</span> and <span className="mono">robust</span> is the story.
                    Hybrid loses 0.145 AUC under degradation; Hybrid + Robust loses only 0.110 — a 24% smaller drop for the same architecture,
                    different training. Freq-Guided's added complexity (attention + aug) collapses to Δ 0.161, below the simple CLIP probe.
                </p>
            </section>

            {/* Calibration — small, but honest */}
            <section className="mb-14">
                <div className="flex items-baseline justify-between mb-4">
                    <div>
                        <div className="smallcaps">Calibration · §3</div>
                        <div className="serif text-xl mt-1">Honest confidences</div>
                    </div>
                    <span className="mono text-xs text-[color:var(--mute)]">temperature fit on 4000-val NLL</span>
                </div>
                <div className="rule mb-3" />
                <table className="w-full text-sm tabular">
                    <thead>
                        <tr className="text-[color:var(--mute)]">
                            <th className="text-left py-2 pr-4 smallcaps text-[10px]">Model</th>
                            <th className="text-right py-2 px-2 smallcaps text-[10px]">τ</th>
                            <th className="text-right py-2 px-2 smallcaps text-[10px]">NLL before → after</th>
                            <th className="text-right py-2 px-2 smallcaps text-[10px]">ECE before → after</th>
                            <th className="text-right py-2 pl-4 smallcaps text-[10px]">Verdict</th>
                        </tr>
                    </thead>
                    <tbody>
                        {models.map(m => {
                            const c = cal[m]; if (!c) return null;
                            const overconfident = c.temperature > 1.5;
                            return (
                                <tr key={m} className="border-t" style={{ borderColor: "var(--line)" }}>
                                    <td className="py-2.5 pr-4">{nameMap[m]}</td>
                                    <td className="py-2.5 px-2 text-right mono text-xs">{c.temperature.toFixed(2)}</td>
                                    <td className="py-2.5 px-2 text-right mono text-xs text-[color:var(--mute)]">
                                        {c.nll_before.toFixed(3)} → <span className="text-[color:var(--ink)]">{c.nll_after.toFixed(3)}</span>
                                    </td>
                                    <td className="py-2.5 px-2 text-right mono text-xs text-[color:var(--mute)]">
                                        {c.ece_before.toFixed(3)} → <span className="text-[color:var(--ink)]">{c.ece_after.toFixed(3)}</span>
                                    </td>
                                    <td className="py-2.5 pl-4 text-right serif italic text-xs" style={{ color: overconfident ? "#d88280" : "#9ec27e" }}>
                                        {overconfident ? "overconfident" : "well-calibrated"}
                                    </td>
                                </tr>
                            );
                        })}
                    </tbody>
                </table>
            </section>

            {/* Closing note */}
            <footer className="mt-12">
                <div className="rule mb-6" />
                <p className="serif italic text-[color:var(--mute)] text-lg leading-relaxed">
                    "Simpler architecture plus smarter training generalised better than a fancier architecture with the same training."
                </p>
                <div className="smallcaps mt-4">CMPE 258 · SJSU · Spring 2026</div>
            </footer>
        </article>
    );
}

function Bar({ value, label, color, maxLabel }) {
    const pct = Math.max(0, Math.min(1, value)) * 100;
    return (
        <div className="flex items-center gap-3">
            <span className="smallcaps text-[10px] w-12">{label}</span>
            <div className="flex-1 relative h-[2px]" style={{ background: "rgba(255,255,255,0.06)" }}>
                <div className="absolute left-0 top-0 bottom-0 transition-all" style={{ width: `${pct}%`, background: color }} />
            </div>
            <span className="mono tabular text-xs w-12 text-right">{value.toFixed(3)}</span>
        </div>
    );
}

// ------------------------------------------------------------------
// App
// ------------------------------------------------------------------
function App() {
    const [previewUrl, setPreviewUrl] = useState(null);
    const [file, setFile] = useState(null);
    const [loading, setLoading] = useState(false);
    const [result, setResult] = useState(null);
    const [compareResults, setCompareResults] = useState(null);
    const [dashboardData, setDashboardData] = useState(null);
    const [view, setView] = useState("detect");
    const [error, setError] = useState(null);

    useEffect(() => {
        fetch(`${API_URL}/dashboard/data`)
            .then(r => r.json())
            .then(d => { setDashboardData(d); if (d?.calibration) CAL.data = d.calibration; })
            .catch(() => {});
    }, []);

    const handleImageSelect = (selectedFile) => {
        if (selectedFile.size > 10 * 1024 * 1024) { setError("Max 10 MB"); return; }
        setFile(selectedFile);
        setPreviewUrl(URL.createObjectURL(selectedFile));
        setResult(null); setCompareResults(null); setError(null);
        setAccentFromResult(null);
    };

    const handleDetect = async () => {
        if (!file) return;
        setLoading(true); setError(null); setResult(null); setCompareResults(null);
        try {
            const fd = new FormData(); fd.append("file", file);
            const res = await fetch(`${API_URL}/detect?model=hybrid_robust`, { method: "POST", body: fd });
            if (!res.ok) throw new Error(await res.text());
            const data = await res.json();
            setAccentFromResult(data);
            setResult(data);
        } catch (e) { setError(e.message); }
        setLoading(false);
    };

    const handleCompare = async () => {
        if (!file) return;
        setLoading(true); setError(null); setCompareResults(null);
        try {
            const fd = new FormData(); fd.append("file", file);
            const res = await fetch(`${API_URL}/detect/compare`, { method: "POST", body: fd });
            if (!res.ok) throw new Error(await res.text());
            setCompareResults(await res.json());
        } catch (e) { setError(e.message); }
        setLoading(false);
    };

    return (
        <div className="min-h-screen">
            {/* Masthead — tiny and editorial */}
            <header className="max-w-6xl mx-auto px-8 pt-8 pb-6 flex items-baseline justify-between">
                <div className="flex items-baseline gap-3">
                    <span className="serif text-2xl tracking-tight">Spectra</span>
                    <span className="smallcaps">AI image forensics</span>
                </div>
                <nav className="flex gap-6 text-sm">
                    <button onClick={() => setView("detect")}
                        className={`transition-colors ${view === 'detect' ? 'text-[color:var(--ink)]' : 'text-[color:var(--mute)] hover:text-[color:var(--ink)]'}`}>
                        Analyse
                    </button>
                    <button onClick={() => setView("dashboard")}
                        className={`transition-colors ${view === 'dashboard' ? 'text-[color:var(--ink)]' : 'text-[color:var(--mute)] hover:text-[color:var(--ink)]'}`}>
                        Evaluation
                    </button>
                </nav>
            </header>
            <div className="accent-line max-w-6xl mx-auto" />

            <main className="max-w-6xl mx-auto px-8 py-10">
                {view === "dashboard" && <Dashboard data={dashboardData} />}

                {view === "detect" && (
                    <div>
                        {/* Before any image is picked, a quiet prompt */}
                        {!previewUrl && !loading && (
                            <div className="max-w-2xl">
                                <div className="smallcaps mb-3">Case file</div>
                                <h1 className="serif text-5xl md:text-6xl leading-[1.05] tracking-tight">
                                    Is this image <span className="italic text-[color:var(--mute)]">captured</span> or <span className="italic text-[color:var(--mute)]">synthesised</span>?
                                </h1>
                                <p className="text-[color:var(--mute)] mt-5 max-w-lg leading-relaxed">
                                    Frequency-guided CLIP detection with spatial evidence and calibrated confidence. Drop an image — photograph or AI-generated — and read the spectrum. The model trained on 2023-era generators (Stable Diffusion, Midjourney, ADM, GLIDE), so modern generators or unusual photos return an honest <span className="text-[color:var(--ink)]">Inconclusive</span> rather than a forced binary.
                                </p>
                                <div className="mt-10 max-w-2xl">
                                    <UploadZone onImageSelect={handleImageSelect} />
                                </div>
                            </div>
                        )}

                        {/* After image is picked */}
                        {previewUrl && (
                            <div className="grid grid-cols-1 md:grid-cols-[1.1fr_1fr] gap-12 md:gap-16">
                                {/* Left: image + heatmap */}
                                <div>
                                    <div className="mb-6 flex items-baseline justify-between">
                                        <div>
                                            <div className="smallcaps">Specimen</div>
                                            <div className="serif italic text-lg mt-0.5 truncate max-w-xs">{file?.name}</div>
                                        </div>
                                        <button
                                            onClick={() => { setPreviewUrl(null); setFile(null); setResult(null); setCompareResults(null); setAccentFromResult(null); }}
                                            className="smallcaps text-[color:var(--mute)] hover:text-[color:var(--ink)] transition-colors">
                                            Replace
                                        </button>
                                    </div>

                                    {result ? (
                                        <ImageViewer result={result} previewUrl={previewUrl} />
                                    ) : (
                                        <div className="rounded overflow-hidden hairline">
                                            <img src={previewUrl} className="block w-full" />
                                        </div>
                                    )}

                                    {/* actions live under the image, not in a floating card */}
                                    {!loading && !result && (
                                        <div className="flex gap-6 mt-6 text-sm">
                                            <button onClick={handleDetect}
                                                className="text-[color:var(--ink)] hover:opacity-70 transition-opacity underline-offset-4 underline decoration-dotted">
                                                → Analyse
                                            </button>
                                            <button onClick={handleCompare}
                                                className="text-[color:var(--mute)] hover:text-[color:var(--ink)] transition-colors underline-offset-4 underline decoration-dotted">
                                                Compare all models
                                            </button>
                                        </div>
                                    )}

                                    {result && !compareResults && (
                                        <div className="mt-6">
                                            <button onClick={handleCompare}
                                                className="text-sm text-[color:var(--mute)] hover:text-[color:var(--ink)] transition-colors underline-offset-4 underline decoration-dotted">
                                                Compare against all models →
                                            </button>
                                        </div>
                                    )}
                                </div>

                                {/* Right: verdict + measurements + evidence */}
                                <div>
                                    {loading && <DCTLoader />}
                                    {!loading && !result && (
                                        <div className="text-[color:var(--mute)] text-sm">
                                            <div className="smallcaps">Awaiting</div>
                                            <div className="serif italic text-xl mt-1">No determination yet.</div>
                                        </div>
                                    )}
                                    {result && <Verdict result={result} />}
                                    {result && <Evidence result={result} />}
                                    {compareResults && <Compare results={compareResults} />}
                                </div>
                            </div>
                        )}

                        {error && <div className="mt-8 text-sm text-[color:#d88280]">Error · {error}</div>}
                    </div>
                )}
            </main>

            <footer className="max-w-6xl mx-auto px-8 py-10">
                <div className="rule mb-6" />
                <div className="flex items-center justify-between text-[10px] smallcaps">
                    <span>Spectra · vol. I</span>
                    <span>CMPE 258 · SJSU · Spring 2026</span>
                </div>
            </footer>
        </div>
    );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
